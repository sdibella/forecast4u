services:

  # ── Development server (hot-reload) ──────────────────────────────────────────
  dev:
    build:
      context: .
      target: dev
    ports:
      - "5173:5173"
    volumes:
      # Mount source for live hot-reload
      - .:/app
      # Prevent host node_modules from overwriting container's
      - /app/node_modules
    env_file:
      - .env
    environment:
      - CHOKIDAR_USEPOLLING=true   # needed for file watching in Docker on some OSes

  # ── Production preview (nginx) ───────────────────────────────────────────────
  prod:
    build:
      context: .
      target: prod
    ports:
      - "8080:80"
    env_file:
      - .env

  # ── Storybook ────────────────────────────────────────────────────────────────
  storybook:
    build:
      context: ./storybook
      dockerfile: Dockerfile
    ports:
      - "6006:6006"
    volumes:
      - ./storybook:/app
      - /app/node_modules
